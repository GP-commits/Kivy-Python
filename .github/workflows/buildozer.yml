name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libltdl-dev libffi-dev libssl-dev python3-dev zip unzip zlib1g-dev libncurses5-dev libncursesw5-dev libbz2-dev libsqlite3-dev libgdbm-dev liblzma-dev tk-dev openjdk-17-jdk \
          autoconf automake libtool
          pip install --upgrade pip
          pip install --upgrade buildozer virtualenv
          pip install cython==0.29.33

      - name: Cache Buildozer and SDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            collaborative_app/.buildozer
          key: ${{ runner.os }}-buildozer-v2-${{ hashFiles('collaborative_app/buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-v2-

      - name: Build with Buildozer
        # We must cd into the collaborative_app directory before running buildozer
        # We also use 'yes' to automatically accept any SDK licenses during the build.
        run: |
          cd collaborative_app
          buildozer android clean
          yes | buildozer android debug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: collaborative_app-apk
          path: collaborative_app/bin/*.apk
